version: 0.0
os: linux

files:
  - source: target/
    destination: /home/ec2-user/user-service

hooks:
  ApplicationStop:
    - location: scripts/stop.sh
      timeout: 300

  BeforeInstall:
    - location: scripts/install.sh
      timeout: 300

  ApplicationStart:
    - location: scripts/start.sh
      timeout: 300

  ValidateService:
    - location: scripts/validate.sh
      timeout: 300
